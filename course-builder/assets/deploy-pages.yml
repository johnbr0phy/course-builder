name: Deploy course homepage to GitHub Pages

# course-builder: edit the two values marked CHANGE-ME below.
on:
  push:
    branches: [CHANGE-ME-branch]        # CHANGE-ME: the branch you're deploying from (default branch is ideal)
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages (auto-enable if needed)
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./CHANGE-ME-course-folder   # CHANGE-ME: folder containing index.html (use . if at repo root)

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
